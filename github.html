<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

    <style>
        .github-contributions {
  margin-top: 4rem;
  text-align: center;
}

.github-contributions h2 {
  font-size: 1.8rem;
  margin-bottom: 1rem;
}

.contribution-graph {
  margin-top: 1.5rem;
  overflow-x: auto;
}

.contribution-graph img {
  max-width: 100%;
  border-radius: 10px;
  background: #0d1117;
  padding: 1rem;
}

/* Optional: GitHub button styling if not already defined */
.btn.github {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  background: #24292e;
  color: #fff;
  padding: 0.7rem 1.2rem;
  border-radius: 6px;
  text-decoration: none;
  font-weight: 500;
}

.btn.github:hover {
  background: #000;
}

    </style>
</head>
<body>
    <section class="github-contributions">
  <h2>GitHub Contributions</h2>

  <a
    href="https://github.com/JudgeTshwarelo"
    target="_blank"
    class="btn github"
  >
    <i class="fab fa-github"></i> View GitHub Profile
  </a>

  <div class="contribution-graph">
    <img
      src="https://ghchart.rshah.org/JudgeTshwarelo"
      alt="Judge Tshwarelo GitHub Contributions"
      loading="lazy"
    />
  </div>
</section>

</body>
</html>
